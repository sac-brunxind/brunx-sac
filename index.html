<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>BRUNX – SAC</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red:       #AA0000;
    --red-hover: #880000;
    --black:     #111111;
    --gray-dark: #333333;
    --gray-mid:  #666666;
    --gray-light:#F4F4F4;
    --white:     #FFFFFF;
    --border:    #DDDDDD;
    --shadow:    0 2px 12px rgba(0,0,0,0.08);
    --radius:    6px;
    --font:      'Segoe UI', Arial, sans-serif;
  }

  body {
    font-family: var(--font);
    background: var(--gray-light);
    color: var(--black);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ===== HEADER ===== */
  header {
    background: var(--white);
    border-bottom: 3px solid var(--red);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: var(--shadow);
  }
  header img { height: 42px; width: auto; }
  .header-title {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gray-mid);
  }
  .header-user {
    font-size: 0.8rem;
    color: var(--gray-mid);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .header-user span { font-weight: 700; color: var(--black); }
  .btn-logout {
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.3rem 0.7rem;
    font-size: 0.75rem;
    cursor: pointer;
    color: var(--gray-mid);
    transition: all 0.2s;
  }
  .btn-logout:hover { border-color: var(--red); color: var(--red); }

  /* ===== NAV ===== */
  nav {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    display: flex;
    padding: 0 2rem;
    overflow-x: auto;
  }
  nav button {
    background: none;
    border: none;
    border-bottom: 3px solid transparent;
    padding: 1rem 1.5rem;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--gray-mid);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  nav button:hover { color: var(--black); border-bottom-color: var(--border); }
  nav button.active { color: var(--red); border-bottom-color: var(--red); }

  /* ===== MAIN ===== */
  main {
    flex: 1;
    padding: 2rem;
    max-width: 860px;
    width: 100%;
    margin: 0 auto;
  }
  .section { display: none; }
  .section.active { display: block; }

  /* ===== CARD ===== */
  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 2rem;
    margin-bottom: 1.5rem;
  }
  .card-title {
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--black);
    margin-bottom: 1.5rem;
    padding-bottom: 0.75rem;
    border-bottom: 2px solid var(--red);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .card-title::before {
    content: '';
    display: inline-block;
    width: 4px;
    height: 18px;
    background: var(--red);
    border-radius: 2px;
  }

  /* ===== FORMS ===== */
  form { display: grid; gap: 1.2rem; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .form-group { display: flex; flex-direction: column; gap: 0.35rem; }
  .form-group.full { grid-column: 1 / -1; }

  label {
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--gray-dark);
  }
  label .opcional {
    font-weight: 400;
    color: var(--gray-mid);
    text-transform: none;
    letter-spacing: 0;
    font-size: 0.75rem;
  }
  input, select, textarea {
    width: 100%;
    padding: 0.55rem 0.75rem;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 0.9rem;
    font-family: var(--font);
    color: var(--black);
    background: var(--white);
    transition: border-color 0.2s, box-shadow 0.2s;
    appearance: none;
    -webkit-appearance: none;
  }
