<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <!-- SEUS ESTILOS CSS AQUI -->
</head>
<body>

  <!-- SEU HEADER AQUI -->
  <!-- SUA NAV AQUI -->
  <main>
    <!-- SUAS SEÇÕES (ENVIO, REEMBOLSO, RECEBIDOS, PENDÊNCIAS) AQUI -->
  </main>
  <!-- SEU FOOTER AQUI -->
  <!-- SUA MODAL DE CONFIRMAÇÃO AQUI -->

  <!-- ======================================================= -->
  <!-- AQUI É ONDE O BLOCO <script> DEVE ESTAR, ANTES DO </body> -->
  <!-- ======================================================= -->
  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxfafNFGUPJnKaSgwL6URt5FMeqtC6Svjgz5G1EEv3WkdiMMzrV_jRXmCorvRAa9UzkBQ/exec';

    /* ===== NAVEGAÇÃO ===== */
    function showSection(id, btn) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('#mainNav button').forEach(b => b.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      if (btn) btn.classList.add('active');
      if (id === 'pendencias') carregarPendencias();
      if (id === 'envio') carregarHistoricoEnvio();
      if (id === 'recebidos') carregarHistoricoRecebidos();
    }

    /* ===== MÁSCARA DE TELEFONE ===== */
    function mascaraTelefone(input) {
      let v = input.value.replace(/\D/g, '');
      if (v.length > 11) v = v.slice(0, 11);
      if (v.length <= 2) {
        input.value = v.length ? '(' + v : '';
      } else if (v.length <= 7) {
        input.value = '(' + v.slice(0, 2) + ')' + v.slice(2);
      } else {
        input.value = '(' + v.slice(0, 2) + ')' + v.slice(2, 7) + '-' + v.slice(7);
      }
    }

    /* ===== DATA ===== */
    function dataHoje() {
      const d = new Date();
      const dia  = String(d.getDate()).padStart(2, '0');
      const mes  = String(d.getMonth() + 1).padStart(2, '0');
      const ano  = d.getFullYear();
      return `${dia}/${mes}/${ano}`;
    }

    function calcularDiasEmAberto(dataRegistro) {
      if (!dataRegistro) return '—';
      const [dia, mes, ano] = dataRegistro.split('/').map(Number);
      const hoje = new Date();
      const dataInicio = new Date(ano, mes - 1, dia); // Mês é 0-indexado
      const diffTempo = Math.abs(hoje.getTime() - dataInicio.getTime());
      const diffDias = Math.ceil(diffTempo / (1000 * 60 * 60 * 24));
      return `${diffDias} dias`;
    }

    /* ===== UTILITÁRIOS ===== */
    function showAlert(id, msg) {
      const el = document.getElementById(id);
      if (msg !== undefined) el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 5000);
    }

    function formatarData(val) {
      if (!val) return '—';
      // Correção da expressão regular: removido o '\n'
      if (/
^
\d{2}\/\d{2}\/\d{4}
$
/.test(val)) return val;
      const d = new Date(val);
      if (isNaN(d)) return val;
      const dia = String(d.getDate()).padStart(2, '0');
      const mes = String(d.getMonth() + 1).padStart(2, '0');
      return `${dia}/${mes}/${d.getFullYear()}`;
    }

    /* ===== HISTÓRICO DE ATIVIDADES (LOCAL) ===== */
    const historicoAtividades = {
      envio: [],
      reembolso: [],
      recebidos: []
    };

    function adicionarAoHistorico(tipo, mensagem) {
      const agora = new Date();
      const hora = String(agora.getHours()).padStart(2, '0');
      const minuto = String(agora.getMinutes()).padStart(2, '0');
      const item = {
        mensagem: mensagem,
        hora: `${hora}:${minuto}`
      };

      historicoAtividades[tipo].unshift(item); // Adiciona no início
      if (historicoAtividades[tipo].length > 5) {
        historicoAtividades[tipo].pop(); // Remove o mais antigo se exceder 5
      }
      renderizarHistorico(tipo);
    }

    function renderizarHistorico(tipo) {
      const lista = document.getElementById(`historico${capitalize(tipo)}`);
      if (!lista) return;

      if (historicoAtividades[tipo].length === 0) {
        lista.innerHTML = '<li class="historico-vazio">Nenhuma ação recente.</li>';
        return;
      }

      lista.innerHTML = historicoAtividades[tipo].map(item => `
        <li class="historico-item">
          <span>${item.mensagem}</span>
          <span class="data">${item.hora}</span>
        </li>
      `).join('');
    }

    function capitalize(s) {
      return s.charAt(0).toUpperCase() + s.slice(1);
    }

    /* ===== OBRIGATORIEDADE RECEBIDOS ===== */
    function toggleObrigatoriedadeRecebidos() {
      const resp = document.getElementById('rc_resp').value;
      const emProcesso = resp === 'Em processo';
      const campos = ['rc_canal','rc_pedido','rc_nome','rc_tel','rc_transp','rc_motivo'];
      campos.forEach(id => {
        const el = document.getElementById(id);
        if (emProcesso) {
          el.removeAttribute('required');
          el.closest('.form-group').querySelector('label').style.color = '';
        } else {
          el.setAttribute('required', '');
        }
      });
      if (emProcesso) {
        document.getElementById('rc_correto').value = '';
        document.getElementById('btnSim').className = '';
        document.getElementById('btnNao').className = '';
      }
    }

    /* ===== VERIFICAÇÃO PEDIDO ===== */
    async function verificarPedidoAoSair(numPedido) {
      const num = String(numPedido).trim();
      if (!num) return;
      try {
        const resp = await fetch(`${SCRIPT_URL}?action=checkPedido&num=${encodeURIComponent(num)}`);
        const data = await resp.json();
        const aviso = document.getElementById('msgEnvioDupInline');
        const btn   = document.getElementById('btnRegistrarEnvio');
        if (data.exists) {
          aviso.style.display = 'block';
          btn.disabled = true;
        } else {
          aviso.style.display = 'none';
          btn.disabled = false;
        }
      } catch(e) { /* silencioso */ }
    }

    /* ===== BADGE PENDÊNCIAS ===== */
    async function atualizarBadgePendencias() {
      const badge = document.getElementById('navBadge');
      try {
        const resp = await fetch(`${SCRIPT_URL}?action=getPendencias`);
        const data = await resp.json();
        const count = (data.pendencias || []).length;
        if (count > 0) {
          badge.textContent = count;
          badge.style.display = 'inline-flex';
        } else {
          badge.style.display = 'none';
        }
      } catch(e) {
        badge.style.display = 'none';
      }
    }

    /* ===== SUBMIT ENVIOS ===== */
    async function submitEnvio() {
      const payload = {
        action:    'addEnvio',
        canal:     document.getElementById('e_canal').value,
        cliente:   document.getElementById('e_cliente').value.trim(),
        telefone:  document.getElementById('e_tel').value.trim(),
        pedido:    document.getElementById('e_pedido').value.trim(),
        falha:     document.getElementById('e_falha').value,
        setor:     document.getElementById('e_setor').value,
        solucao:   document.getElementById('e_solucao').value,
        obs:       document.getElementById('e_obs').value.trim()
      };

      const obrigatorios = ['canal','cliente','telefone','pedido','falha','setor','solucao'];
      if (obrigatorios.some(k => !payload[k])) {
        showAlert('msgEnvioErr', 'Preencha todos os campos obrigatórios.');
        return;
      }

      try {
        const resp   = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
        const result = await resp.json();

        if (result.ok) {
          showAlert('msgEnvioOk');
          adicionarAoHistorico('envio', `Envio registrado: Pedido ${payload.pedido}`);
          limparEnvio();
          atualizarBadgePendencias();
        } else {
          showAlert('msgEnvioErr', 'Erro: ' + (result.error || 'desconhecido'));
        }
      } catch(e) {
        showAlert('msgEnvioErr', 'Erro de conexão com o servidor.');
      }
    }

    function limparEnvio() {
      document.getElementById('formEnvio').reset();
      document.getElementById('msgEnvioDupInline').style.display = 'none';
      document.getElementById('btnRegistrarEnvio').disabled = false;
    }

    /* ===== SUBMIT REEMBOLSO ===== */
    async function submitReembolso() {
      const payload = {
        action:    'addReembolso',
        cliente:   document.getElementById('r_cliente').value.trim(),
        loja:      document.getElementById('r_loja').value,
        tipo:      document.getElementById('r_tipo').value,
        valor:     document.getElementById('r_valor').value.trim(),
        motivo:    document.getElementById('r_motivo').value,
        nfVenda:   document.getElementById('r_nfVenda').value.trim(),
        nfDevol:   document.getElementById('r_nfDevol').value.trim()
      };

      const obrigatorios = ['cliente','loja','tipo','valor','motivo'];
      if (obrigatorios.some(k => !payload[k])) {
        showAlert('msgReembErr', 'Preencha todos os campos obrigatórios.');
        return;
      }

      try {
        const resp   = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
        const result = await resp.json();

        if (result.ok) {
          showAlert('msgReembOk');
          adicionarAoHistorico('reembolso', `Reembolso registrado: Cliente ${payload.cliente}`);
          document.getElementById('formReembolso').reset();
        } else {
          showAlert('msgReembErr', 'Erro: ' + (result.error || 'desconhecido'));
        }
      } catch(e) {
        showAlert('msgReembErr', 'Erro de conexão com o servidor.');
      }
    }

    /* ===== SUBMIT RECEBIDOS ===== */
    function selecionarCorreto(valor) {
      document.getElementById('rc_correto').value = valor;
      document.getElementById('btnSim').className = valor === 'Sim' ? 'selected-sim' : '';
      document.getElementById('btnNao').className = valor === 'Não' ? 'selected-nao' : '';
    }

    async function submitRecebidos() {
      const emProcesso = document.getElementById('rc_resp').value === 'Em processo';

      const payload = {
        action:            emProcesso ? 'addPendencia' : 'addRecebido',
        responsavelFrete:  document.getElementById('rc_resp').value,
        canalVenda:        document.getElementById('rc_canal').value,
        numPedido:         document.getElementById('rc_pedido').value.trim(),
        nomeCliente:       document.getElementById('rc_nome').value.trim(),
        telefone:          document.getElementById('rc_tel').value.trim(),
        transportadora:    document.getElementById('rc_transp').value,
        motivoTroca:       document.getElementById('rc_motivo').value,
        produtoCorreto:    document.getElementById('rc_correto').value,
        produtosRecebidos: document.getElementById('rc_pecas').value.trim(),
        observacao:        document.getElementById('rc_obs').value.trim()
      };

      if (!emProcesso) {
        const obrigatorios = ['responsavelFrete','canalVenda','numPedido','nomeCliente','telefone',
                              'transportadora','motivoTroca','produtoCorreto','produtosRecebidos'];
        if (obrigatorios.some(k => !payload[k])) {
          showAlert('msgRecebErr', 'Preencha todos os campos obrigatórios.');
          return;
        }
      } else { // Se for "Em processo", verificar campos essenciais para a pendência
        const essenciaisPendencia = ['numPedido', 'nomeCliente', 'telefone'];
        if (essenciaisPendencia.some(k => !payload[k])) {
          showAlert('msgRecebErr', 'Para criar uma pendência, o número do pedido, nome do cliente e telefone são obrigatórios.');
          return;
        }
      }

      try {
        const resp   = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
        const result = await resp.json();

        if (result.ok) {
          if (emProcesso) {
            showAlert('msgRecebPendencia');
            adicionarAoHistorico('recebidos', `Pendência criada: Pedido ${payload.numPedido}`);
            atualizarBadgePendencias();
          } else {
            showAlert('msgRecebOk');
            adicionarAoHistorico('recebidos', `Recebido registrado: Pedido ${payload.numPedido}`);
          }
          limparRecebidos();
        } else {
          showAlert('msgRecebErr', 'Erro: ' + (result.error || 'desconhecido'));
        }
      } catch(e) {
        showAlert('msgRecebErr', 'Erro de conexão com o servidor.');
      }
    }

    function limparRecebidos() {
      document.getElementById('formRecebidos').reset();
      document.getElementById('rc_correto').value = '';
      document.getElementById('btnSim').className = '';
      document.getElementById('btnNao').className = '';
      toggleObrigatoriedadeRecebidos(); // Reseta a obrigatoriedade
    }

    /* ===== PENDÊNCIAS ===== */
    let listaPendenciasGlobal = [];
    let pendenciaParaResolver = null; // Para a modal de confirmação

    async function carregarPendencias() {
      const container = document.getElementById('pendenciasContainer');
      container.innerHTML = '<p style="color:var(--gray-mid);font-size:.85rem;padding:1rem;">Carregando...</p>';
      try {
        const resp = await fetch(`${SCRIPT_URL}?action=getPendencias`);
        const data = await resp.json();
        listaPendenciasGlobal = data.pendencias || [];
        renderizarPendencias(listaPendenciasGlobal);
      } catch(e) {
        container.innerHTML = '<p style="color:var(--red);font-size:.85rem;padding:1rem;">Erro ao carregar pendências.</p>';
      }
    }

    function filtrarPendencias() {
      const termo = document.getElementById('buscaPendencia').value.toLowerCase().trim();
      if (!termo) {
        renderizarPendencias(listaPendenciasGlobal);
        return;
      }
      const filtrada = listaPendenciasGlobal.filter(p => {
        return (
          (p.NUM_PEDIDO    || '').toLowerCase().includes(termo) ||
          (p.NOME_CLIENTE  || '').toLowerCase().includes(termo) ||
          (p.TELEFONE      || '').toLowerCase().includes(termo) ||
          (p.STATUS_PENDENCIA || '').toLowerCase().includes(termo)
        );
      });
      renderizarPendencias(filtrada);
    }

    function renderizarPendencias(lista) {
      const container = document.getElementById('pendenciasContainer');
      const badge     = document.getElementById('navBadge');

      if (!lista.length) {
        badge.style.display = 'none';
        container.innerHTML = `
          <div class="pendencias-vazio">
            <span class="icone">✅</span>
            <h3>Nenhuma pendência encontrada</h3>
            <p>Todos os registros foram processados ou nenhum resultado para a busca.</p>
          </div>`;
        return;
      }

      badge.textContent = listaPendenciasGlobal.length;
      badge.style.display = 'inline-flex';

      container.innerHTML = lista.map((p, idx) => {
        const statusClass = p.STATUS_PENDENCIA === 'Aguardando retorno do cliente' ? 'status-aguardando' : 'status-em-processo';
        const diasEmAberto = calcularDiasEmAberto(formatarData(p.DATA));

        return `
        <div class="pendencia-linha" id="pcard-${idx}">
          <div class="pendencia-resumo" onclick="toggleCard(${idx})">
            <div class="pendencia-resumo-info">
              <strong>Pedido ${p.NUM_PEDIDO || '—'}</strong>
              <span>${p.NOME_CLIENTE || '—'}</span>
              <span>${formatarData(p.DATA)} (${diasEmAberto})</span>
              <span>${p.TELEFONE || '—'}</span>
            </div>
            <div style="display:flex;align-items:center;gap:0.75rem;">
              <span class="pendencia-badge ${statusClass}">${p.STATUS_PENDENCIA || 'Em processo - aguardando retorno do cliente'}</span>
              <span class="pendencia-chevron">▼</span>
            </div>
          </div>

          <div class="pendencia-corpo">
            <div class="pendencia-infos" id="infos-view-${idx}">
              <div class="pendencia-info-item"><span>Canal</span><span>${p.CANAL_VENDA || '—'}</span></div>
              <div class="pendencia-info-item"><span>Transportadora</span><span>${p.TRANSPORTADORA || '—'}</span></div>
              <div class="pendencia-info-item"><span>Motivo da Troca</span><span>${p.MOTIVO_TROCA || '—'}</span></div>
              <div class="pendencia-info-item"><span>Produto Correto?</span><span>${p.PRODUTO_CORRETO || '—'}</span></div>
              <div class="pendencia-info-item"><span>Peças Recebidas</span><span>${p.PRODUTOS_RECEBIDOS || '—'}</span></div>
              <div class="pendencia-info-item"><span>Observação</span><span>${p.OBSERVACAO || '—'}</span></div>
            </div>

            <!-- EDIÇÃO -->
            <div class="pendencia-editar" id="editar-${idx}">
              <h4>Editar informações</h4>
              <div class="editar-grid">
                <div class="form-group">
                  <label>Número do Pedido</label>
                  <input type="text" id="ed_pedido_${idx}" value="${p.NUM_PEDIDO || ''}">
                </div>
                <div class="form-group">
                  <label>Nome do Cliente</label>
                  <input type="text" id="ed_nome_${idx}" value="${p.NOME_CLIENTE || ''}">
                </div>
                <div class="form-group">
                  <label>Telefone</label>
                  <input type="tel" id="ed_tel_${idx}" value="${p.TELEFONE || ''}" maxlength="14" oninput="mascaraTelefone(this)">
                </div>
                <div class="form-group">
                  <label>Canal de Venda</label>
                  <select id="ed_canal_${idx}">
                    <option value="">Selecione</option>
                    ${['Brunx Varejo','Brunx Atacado','Liso&Co','Mercado Livre Brunx','Mercado Livre VST','Mercado Livre Over']
                      .map(o => `<option${p.CANAL_VENDA === o ? ' selected' : ''}>${o}</option>`).join('')}
                  </select>
                </div>
                <div class="form-group">
                  <label>Transportadora</label>
                  <select id="ed_transp_${idx}">
                    <option value="">Selecione</option>
                    ${['PAC / Sedex','Loggi','Jadlog','J&T','Buslog','Gol','Mercado Livre']
                      .map(o => `<option${p.TRANSPORTADORA === o ? ' selected' : ''}>${o}</option>`).join('')}
                  </select>
                </div>
                <div class="form-group">
                  <label>Motivo da Troca</label>
                  <select id="ed_motivo_${idx}">
                    <option value="">Selecione</option>
                    ${['Troca de tamanho','Envio errado','Peças danificadas','Não gostou das peças','Problema transportadora']
                      .map(o => `<option${p.MOTIVO_TROCA === o ? ' selected' : ''}>${o}</option>`).join('')}
                  </select>
                </div>
                <div class="form-group">
                  <label>Produto Correto?</label>
                  <select id="ed_correto_${idx}">
                    <option value="">Selecione</option>
                    <option${p.PRODUTO_CORRETO === 'Sim' ? ' selected' : ''}>Sim</option>
                    <option${p.PRODUTO_CORRETO === 'Não' ? ' selected' : ''}>Não</option>
                  </select>
                </div>
                <div class="form-group">
                  <label>Peças Recebidas</label>
                  <input type="text" id="ed_pecas_${idx}" value="${p.PRODUTOS_RECEBIDOS || ''}">
                </div>
                <div class="form-group">
                  <label>Status da Pendência</label>
                  <select id="ed_status_${idx}">
                    <option value="Em processo - aguardando retorno do cliente"${p.STATUS_PENDENCIA === 'Em processo - aguardando retorno do cliente' ? ' selected' : ''}>Em processo - aguardando retorno do cliente</option>
                    <option value="Aguardando retorno do cliente"${p.STATUS_PENDENCIA === 'Aguardando retorno do cliente' ? ' selected' : ''}>Aguardando retorno do cliente</option>
                  </select>
                </div>
                <div class="form-group" style="grid-column:1/-1;">
                  <label>Observação</label>
                  <input type="text" id="ed_obs_${idx}" value="${p.OBSERVACAO || ''}">
                </div>
              </div>
              <div style="display:flex;gap:0.75rem;justify-content:flex-end;margin-top:0.75rem;">
                <button class="btn btn-outline" onclick="cancelarEdicao(${idx})">Cancelar</button>
                <button class="btn btn-warning" onclick="salvarEdicaoLocal(${idx}, ${p._linha})">Salvar Edição</button>
              </div>
            </div>

            <!-- RESOLVER -->
            <div class="pendencia-resolver" id="resolver-${idx}">
              <h4>Definir responsável pelo frete</h4>
              <div class="resolver-row">
                <div class="form-group">
                  <label>Responsável</label>
                  <select id="resp-${idx}">
                    <option value="">Selecione</option>
                    <option>Fábrica</option>
                    <option>Cliente</option>
                  </select>
                </div>
                <div class="form-group">
                  <label>Observação <span class="opcional">(opcional)</span></label>
                  <input type="text" id="obs-${idx}" placeholder="Complemento opcional">
                </div>
                <button class="btn btn-success" onclick="showConfirmModal(${idx})">Confirmar</button>
              </div>
              <div class="alert alert-error" id="erroResolver-${idx}"></div>
            </div>

            <div class="pendencia-actions">
              <button class="btn btn-outline" onclick="toggleEditar(${idx})">Editar</button>
              <button class="btn btn-primary" onclick="toggleResolver(${idx})">Resolver Pendência</button>
            </div>
          </div>
        </div>
      `;
      }).join('');
    }

    function toggleCard(idx) {
      document.getElementById(`pcard-${idx}`).classList.toggle('aberta');
    }

    function toggleEditar(idx) {
      const ed = document.getElementById(`editar-${idx}`);
      const rs = document.getElementById(`resolver-${idx}`);
      rs.classList.remove('aberto');
      ed.classList.toggle('aberto');
    }

    function cancelarEdicao(idx) {
      document.getElementById(`editar-${idx}`).classList.remove('aberto');
    }

    async function salvarEdicaoLocal(idx, linha) {
      const p = listaPendenciasGlobal.find((_, i) => i === idx);
      if (!p) return;

      const payload = {
        action:            'updatePendencia',
        linha:             linha,
        numPedido:         document.getElementById(`ed_pedido_${idx}`).value.trim(),
        nomeCliente:       document.getElementById(`ed_nome_${idx}`).value.trim(),
        telefone:          document.getElementById(`ed_tel_${idx}`).value.trim(),
        canalVenda:        document.getElementById(`ed_canal_${idx}`).value,
        transportadora:    document.getElementById(`ed_transp_${idx}`).value,
        motivoTroca:       document.getElementById(`ed_motivo_${idx}`).value,
        produtoCorreto:    document.getElementById(`ed_correto_${idx}`).value,
        produtosRecebidos: document.getElementById(`ed_pecas_${idx}`).value.trim(),
        observacao:        document.getElementById(`ed_obs_${idx}`).value.trim(),
        statusPendencia:   document.getElementById(`ed_status_${idx}`).value
      };

      try {
        const resp = await fetch(SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify(payload)
        });
        const result = await resp.json();

        if (result.ok) {
          // Atualiza o objeto localmente para refletir a mudança
          p.NUM_PEDIDO         = payload.numPedido;
          p.NOME_CLIENTE       = payload.nomeCliente;
          p.TELEFONE           = payload.telefone;
          p.CANAL_VENDA        = payload.canalVenda;
          p.TRANSPORTADORA     = payload.transportadora;
          p.MOTIVO_TROCA       = payload.motivoTroca;
          p.PRODUTO_CORRETO    = payload.produtoCorreto;
          p.PRODUTOS_RECEBIDOS = payload.produtosRecebidos;
          p.OBSERVACAO         = payload.observacao;
          p.STATUS_PENDENCIA   = payload.statusPendencia;

          document.getElementById(`editar-${idx}`).classList.remove('aberto');
          renderizarPendencias(listaPendenciasGlobal); // Renderiza novamente para atualizar a UI
          setTimeout(() => {
            document.getElementById(`pcard-${idx}`).classList.add('aberta'); // Mantém o card aberto
          }, 50);
          adicionarAoHistorico('pendencias', `Pendência ${p.NUM_PEDIDO} editada.`);
        } else {
          showAlert(`erroResolver-${idx}`, 'Erro ao salvar edição: ' + (result.error || 'desconhecido'));
        }
      } catch (e) {
        showAlert(`erroResolver-${idx}`, 'Erro de conexão ao salvar edição.');
      }
    }

    function toggleResolver(idx) {
      const rs = document.getElementById(`resolver-${idx}`);
      const ed = document.getElementById(`editar-${idx}`);
      ed.classList.remove('aberto');
      rs.classList.toggle('aberto');
    }

    /* ===== MODAL DE CONFIRMAÇÃO ===== */
    function showConfirmModal(idx) {
      const p = listaPendenciasGlobal.find((_, i) => i === idx);
      if (!p) return;

      const responsavel = document.getElementById(`resp-${idx}`).value;
      const obsResolver = document.getElementById(`obs-${idx}`).value.trim();
      const errEl       = document.getElementById(`erroResolver-${idx}`);

      if (!responsavel) {
        errEl.textContent = 'Selecione o responsável pelo frete antes de confirmar.';
        errEl.style.display = 'block';
        setTimeout(() => { errEl.style.display = 'none'; }, 4000);
        return;
      }

      const obrigatorios = {
        'Número do Pedido':      p.NUM_PEDIDO,
        'Nome do Cliente':       p.NOME_CLIENTE,
        'Telefone':              p.TELEFONE,
        'Canal de Venda':        p.CANAL_VENDA,
        'Transportadora':        p.TRANSPORTADORA,
        'Motivo da Troca':       p.MOTIVO_TROCA,
        'Produto Correto?':      p.PRODUTO_CORRETO,
        'Peças Recebidas':       p.PRODUTOS_RECEBIDOS
      };

      const faltando = Object.entries(obrigatorios)
        .filter(([, v]) => !v || !String(v).trim())
        .map(([k]) => k);

      if (faltando.length) {
        errEl.textContent = `Preencha os campos obrigatórios antes de resolver: ${faltando.join(', ')}.`;
        errEl.style.display = 'block';
        setTimeout(() => { errEl.style.display = 'none'; }, 6000);
        return;
      }

      pendenciaParaResolver = {
        idx: idx,
        linha: p._linha,
        responsavel: responsavel,
        obsResolver: obsResolver,
        pendencia: p
      };

      document.getElementById('modalPedido').textContent = p.NUM_PEDIDO || '—';
      document.getElementById('confirmModal').style.display = 'flex';
    }

    function hideConfirmModal() {
      document.getElementById('confirmModal').style.display = 'none';
      pendenciaParaResolver = null;
    }

    document.getElementById('btnConfirmarResolucao').addEventListener('click', () => {
      if (pendenciaParaResolver) {
        confirmarResolucao(
          pendenciaParaResolver.idx,
          pendenciaParaResolver.linha,
          pendenciaParaResolver.responsavel,
          pendenciaParaResolver.obsResolver
        );
        hideConfirmModal();
      }
    });

    async function confirmarResolucao(idx, linha, responsavel, obsResolver) {
      const p = listaPendenciasGlobal.find((_, i) => i === idx);
      if (!p) return;

      const payload = {
        action:            'resolverPendencia',
        data:              p.DATA || dataHoje(),
        linha:             linha,
        responsavel:       responsavel,
        canalVenda:        p.CANAL_VENDA,
        numPedido:         p.NUM_PEDIDO,
        nomeCliente:       p.NOME_CLIENTE,
        telefone:          p.TELEFONE,
        transportadora:    p.TRANSPORTADORA,
        motivoTroca:       p.MOTIVO_TROCA,
        produtoCorreto:    p.PRODUTO_CORRETO,
        produtosRecebidos: p.PRODUTOS_RECEBIDOS,
        observacao:        obsResolver || p.OBSERVACAO || '',
        statusPendencia:   'Concluído' // Status final ao resolver
      };

      try {
        const resp   = await fetch(SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify(payload)
        });
        const result = await resp.json();

        if (result.ok) {
          const card = document.getElementById(`pcard-${idx}`);
          card.style.transition = 'opacity 0.4s';
          card.style.opacity = '0';
          setTimeout(() => {
            listaPendenciasGlobal = listaPendenciasGlobal.filter((_, i) => i !== idx);
            renderizarPendencias(listaPendenciasGlobal);
            atualizarBadgePendencias();
          }, 400);
          adicionarAoHistorico('pendencias', `Pendência ${p.NUM_PEDIDO} resolvida.`);
        } else {
          showAlert(`erroResolver-${idx}`, 'Erro: ' + (result.error || 'desconhecido'));
        }
      } catch(e) {
        showAlert(`erroResolver-${idx}`, 'Erro de conexão.');
      }
    }

    /* ===== FILTROS E HISTÓRICO DE ENVIOS E RECEBIDOS (NOVA SEÇÃO) ===== */

    // Adiciona a nova seção de histórico e filtros para Envio
    document.addEventListener('DOMContentLoaded', () => {
      const formEnvio = document.getElementById('formEnvio');
      const historicoEnvioHtml = `
        <div class="card" style="margin-top: 2rem;">
          <div class="card-title">Histórico de Envios</div>
          <div class="filtros-wrap">
            <div class="form-group full busca-texto">
              <label for="filtroEnvioBusca">Buscar (Pedido, Cliente, Telefone)</label>
              <input type="text" id="filtroEnvioBusca" placeholder="Ex: 12345, João Silva" oninput="aplicarFiltrosEnvio()">
            </div>
            <div class="form-group">
              <label for="filtroEnvioDataInicio">Data Início</label>
              <input type="date" id="filtroEnvioDataInicio" onchange="aplicarFiltrosEnvio()">
            </div>
            <div class="form-group">
              <label for="filtroEnvioDataFim">Data Fim</label>
              <input type="date" id="filtroEnvioDataFim" onchange="aplicarFiltrosEnvio()">
            </div>
            <div class="form-group">
              <label for="filtroEnvioCanal">Canal de Venda</label>
              <select id="filtroEnvioCanal" onchange="aplicarFiltrosEnvio()">
                <option value="">Todos</option>
                <option>Brunx Varejo</option>
                <option>Brunx Atacado</option>
                <option>Liso&Co</option>
              </select>
            </div>
          </div>
          <div id="historicoEnviosCompleto">
            <p class="historico-vazio">Carregando histórico...</p>
          </div>
        </div>
      `;
      formEnvio.insertAdjacentHTML('afterend', historicoEnvioHtml);

      // Adiciona a nova seção de histórico e filtros para Recebidos
      const formRecebidos = document.getElementById('formRecebidos');
      const historicoRecebidosHtml = `
        <div class="card" style="margin-top: 2rem;">
          <div class="card-title">Histórico de Recebidos</div>
          <div class="filtros-wrap">
            <div class="form-group full busca-texto">
              <label for="filtroRecebidosBusca">Buscar (Pedido, Cliente, Telefone)</label>
              <input type="text" id="filtroRecebidosBusca" placeholder="Ex: 12345, Maria Souza" oninput="aplicarFiltrosRecebidos()">
            </div>
            <div class="form-group">
              <label for="filtroRecebidosDataInicio">Data Início</label>
              <input type="date" id="filtroRecebidosDataInicio" onchange="aplicarFiltrosRecebidos()">
            </div>
            <div class="form-group">
              <label for="filtroRecebidosDataFim">Data Fim</label>
              <input type="date" id="filtroRecebidosDataFim" onchange="aplicarFiltrosRecebidos()">
            </div>
            <div class="form-group">
              <label for="filtroRecebidosCanal">Canal de Venda</label>
              <select id="filtroRecebidosCanal" onchange="aplicarFiltrosRecebidos()">
                <option value="">Todos</option>
                <option>Brunx Varejo</option>
                <option>Brunx Atacado</option>
                <option>Liso&Co</option>
                <option>Mercado Livre Brunx</option>
                <option>Mercado Livre VST</option>
                <option>Mercado Livre Over</option>
              </select>
            </div>
          </div>
          <div id="historicoRecebidosCompleto">
            <p class="historico-vazio">Carregando histórico...</p>
          </div>
        </div>
      `;
      formRecebidos.insertAdjacentHTML('afterend', historicoRecebidosHtml);
    });

    let listaEnviosCompleta = [];
    let listaRecebidosCompleta = [];

    async function carregarDadosParaFiltros(tipo) {
      const containerId = tipo === 'envio' ? 'historicoEnviosCompleto' : 'historicoRecebidosCompleto';
      const action = tipo === 'envio' ? 'getEnvios' : 'getRecebidos';
      const listaGlobal = tipo === 'envio' ? 'listaEnviosCompleta' : 'listaRecebidosCompleta';
      const container = document.getElementById(containerId);

      container.innerHTML = '<p class="historico-vazio">Carregando dados completos...</p>';
      try {
        const resp = await fetch(`${SCRIPT_URL}?action=${action}`);
        const data = await resp.json();
        window[listaGlobal] = data[tipo] || [];
        if (tipo === 'envio') {
          renderizarHistoricoCompletoEnvio(window[listaGlobal]);
        } else {
          renderizarHistoricoCompletoRecebidos(window[listaGlobal]);
        }
      } catch(e) {
        container.innerHTML = `<p class="historico-vazio" style="color:var(--red);">Erro ao carregar histórico completo de ${tipo}.</p>`;
      }
    }

    function aplicarFiltrosEnvio() {
      const termoBusca = document.getElementById('filtroEnvioBusca').value.toLowerCase().trim();
      const dataInicio = document.getElementById('filtroEnvioDataInicio').value;
      const dataFim    = document.getElementById('filtroEnvioDataFim').value;
      const canal      = document.getElementById('filtroEnvioCanal').value;

      let filtrada = listaEnviosCompleta.filter(e => {
        const dataRegistro = new Date(e.DATA);
        const dataInicioObj = dataInicio ? new Date(dataInicio) : null;
        const dataFimObj    = dataFim    ? new Date(dataFim)    : null;

        // Ajuste para considerar o dia inteiro na data final
        if (dataFimObj) dataFimObj.setDate(dataFimObj.getDate() + 1);

        const matchBusca = termoBusca === '' ||
          (e.NUM_PEDIDO    || '').toLowerCase().includes(termoBusca) ||
          (e.CLIENTE       || '').toLowerCase().includes(termoBusca) ||
          (e.TELEFONE      || '').toLowerCase().includes(termoBusca);

        const matchData = (!dataInicioObj || dataRegistro >= dataInicioObj) &&
                          (!dataFimObj    || dataRegistro < dataFimObj);

        const matchCanal = canal === '' || e.CANAL_VENDA === canal;

        return matchBusca && matchData && matchCanal;
      });

      renderizarHistoricoCompletoEnvio(filtrada);
    }

    function renderizarHistoricoCompletoEnvio(lista) {
      const container = document.getElementById('historicoEnviosCompleto');
      if (!lista.length) {
        container.innerHTML = '<p class="historico-vazio">Nenhum envio encontrado com os filtros aplicados.</p>';
        return;
      }
      container.innerHTML = lista.map(e => `
        <div class="pendencia-linha" style="border-left-color:#166534;">
          <div class="pendencia-resumo" style="cursor:default;">
            <div class="pendencia-resumo-info">
              <strong>Pedido ${e.NUM_PEDIDO || '—'}</strong>
              <span>${e.CLIENTE || '—'}</span>
              <span>${formatarData(e.DATA)}</span>
              <span>${e.CANAL_VENDA || '—'}</span>
            </div>
            <span class="pendencia-badge" style="background:#D1FAE5;border-color:#6EE7B7;color:#065F46;">Envio</span>
          </div>
        </div>
      `).join('');
    }

    function aplicarFiltrosRecebidos() {
      const termoBusca = document.getElementById('filtroRecebidosBusca').value.toLowerCase().trim();
      const dataInicio = document.getElementById('filtroRecebidosDataInicio').value;
      const dataFim    = document.getElementById('filtroRecebidosDataFim').value;
      const canal      = document.getElementById('filtroRecebidosCanal').value;

      let filtrada = listaRecebidosCompleta.filter(r => {
        const dataRegistro = new Date(r.DATA);
        const dataInicioObj = dataInicio ? new Date(dataInicio) : null;
        const dataFimObj    = dataFim    ? new Date(dataFim)    : null;

        // Ajuste para considerar o dia inteiro na data final
        if (dataFimObj) dataFimObj.setDate(dataFimObj.getDate() + 1);

        const matchBusca = termoBusca === '' ||
          (r.NUM_PEDIDO    || '').toLowerCase().includes(termoBusca) ||
          (r.NOME_CLIENTE  || '').toLowerCase().includes(termoBusca) ||
          (r.TELEFONE      || '').toLowerCase().includes(termoBusca);

        const matchData = (!dataInicioObj || dataRegistro >= dataInicioObj) &&
                          (!dataFimObj    || dataRegistro < dataFimObj);

        const matchCanal = canal === '' || r.CANAL_VENDA === canal;

        return matchBusca && matchData && matchCanal;
      });

      renderizarHistoricoCompletoRecebidos(filtrada);
    }

    function renderizarHistoricoCompletoRecebidos(lista) {
      const container = document.getElementById('historicoRecebidosCompleto');
      if (!lista.length) {
        container.innerHTML = '<p class="historico-vazio">Nenhum recebido encontrado com os filtros aplicados.</p>';
        return;
      }
      container.innerHTML = lista.map(r => `
        <div class="pendencia-linha" style="border-left-color:#059669;">
          <div class="pendencia-resumo" style="cursor:default;">
            <div class="pendencia-resumo-info">
              <strong>Pedido ${r.NUM_PEDIDO || '—'}</strong>
              <span>${r.NOME_CLIENTE || '—'}</span>
              <span>${formatarData(r.DATA)}</span>
              <span>${r.CANAL_VENDA || '—'}</span>
            </div>
            <span class="pendencia-badge" style="background:#D1FAE5;border-color:#6EE7B7;color:#065F46;">Recebido</span>
          </div>
        </div>
      `).join('');
    }

    /* ===== INIT (AJUSTE) ===== */
    window.addEventListener('DOMContentLoaded', () => {
      atualizarBadgePendencias();
      renderizarHistorico('envio');
      renderizarHistorico('reembolso');
      renderizarHistorico('recebidos');

      // Carregar dados completos para os filtros quando as seções forem ativadas
      document.getElementById('mainNav').addEventListener('click', (event) => {
        const target = event.target;
        if (target.tagName === 'BUTTON') {
          const sectionId = target.getAttribute('onclick').match(/'([^']+)'/)[1];
          if (sectionId === 'envio') {
            carregarDadosParaFiltros('envio');
          } else if (sectionId === 'recebidos') {
            carregarDadosParaFiltros('recebidos');
          }
        }
      });

      // Carregar dados para a seção ativa inicialmente (se for Envio ou Recebidos)
      const activeSectionId = document.querySelector('.section.active').id;
      if (activeSectionId === 'envio') {
        carregarDadosParaFiltros('envio');
      } else if (activeSectionId === 'recebidos') {
        carregarDadosParaFiltros('recebidos');
      }
    });
  </script>
</body>
</html>
